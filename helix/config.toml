theme = "tokyonight_storm"

[editor]
line-number = "relative"
true-color = true
rulers = [80]
shell = ["zsh", "-c"]
bufferline = "multiple"
text-width = 80
auto-completion = true

[editor.soft-wrap]
enable = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
C-s = ":write"

[keys.normal.space.c]
r = [":w", ":config-reload"]
o = ":config-open"

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "version-control", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
